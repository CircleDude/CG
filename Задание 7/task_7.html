<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Задание 7</title>
    <link rel="stylesheet" href="../CSS/style.css">

    <script src="../JavaScript/libs/d3.v7.min.js"></script>
    <script src="../JavaScript/libs/math.js"></script>
    <script src="../JavaScript/canvasInterface.js"></script>
    <script src="../JavaScript/functions.js"></script>
    <script src="task_7.js"></script>

</head>
<body>

<div id="ui">
    <div class="group">
        Сфера
        <label>
            Детализация:
            <input id="sphereDetail" type="number" min="4" max="64" step="1" value="10">
        </label>
    </div>

    <div class="group">
        Тор
        <label>
            Детализация:
            <input id="torusDetail" type="number" min="4" max="64" step="1" value="12">
        </label>
    </div>

    <div class="group">
        Освещение
        <label><input type="radio" name="shadeMode" value="gouraud" checked> Гуро</label>
        <label><input type="radio" name="shadeMode" value="phong"> Фонг</label>
        <label><input type="checkbox" id="useAmbient" checked> ambient</label>
        <label><input type="checkbox" id="useSpecular"> specular</label>
        <label>
            Блеск:
            <input id="shininess" type="number" min="1" max="200" step="1" value="28">
        </label>
    </div>

    <div class="group">
        Тени
        <label><input type="checkbox" id="useShadows" checked> на плоскость</label>
    </div>

    <div class="group">
        Свет 1
        <label><input type="checkbox" id="light1Enabled" checked> вкл</label>
    </div>

    <div class="group">
        Свет 2
        <label><input type="checkbox" id="light2Enabled" checked> вкл</label>
    </div>
</div>

<canvas id="myCanvas"></canvas>

<div style="margin-top:10px;">mouse:
    <div id="x"></div>
    <div id="y"></div>
</div>

</body>
</html>
